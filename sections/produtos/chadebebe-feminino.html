        body {
            margin: 0;

            background-color: #5a2f4a;

            color: #ffffff;
            min-height: 100vh;
        }

        header {
            text-align: center;
            padding: 30px 20px;
        }

        h1 {
            color: #d4912c;
            margin: 0;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 25px;
            padding: 30px;
            max-width: 1100px;
            margin: 0 auto;
        }

        .photo-card {
            background-color: rgba(255, 255, 255, 0.06);
            padding: 15px;
            border-radius: 22px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .photo-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.45);
        }

        .photo-card img {
            width: 100%;
            height: auto;
            border-radius: 16px;
        }

        .caption {
            text-align: center;
            margin-top: 10px;
            font-size: 14px;
            opacity: 0.85;
        }

        .info {
            text-align: center;
            padding: 15px;
            font-size: 13px;
            opacity: 0.75;
        }
    </style>
</head>
